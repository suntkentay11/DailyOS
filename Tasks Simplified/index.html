<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://kit.fontawesome.com/41cda13e3c.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <figure class="logo">
            <img src="./assets/logo.png" alt="Logo">
        </figure>
        <h1 class="nav__title">TasksSimplified</h1>
        <input type="text" class="nav__search" placeholder="Search your task here...">
        <button class="nav__search-button"><i class="fa-solid fa-magnifying-glass"></i></button>
        <div class="date">
            <p class="date__day">Monday</p>
            <p class="date__date">April 27, 2024</p>
        </div>
    </header>
    <section>
        <div class="container">
            <div class="sidebar">
                <div class="profile">
                    <figure class="profile__img">
                        <img src="./assets/profile.jpg" alt="Profile Picture">
                    </figure>
                    <h2 class="profile__name">Bella Whiskers</h2>
                    <p class="profile__email">bella.whiskers@example.com</p>
                </div>
                <button class="sidebar__button"><i class="fa-solid fa-house"></i> Home</button>
                <button class="sidebar__button"><i class="fa-solid fa-list"></i> Tasks</button>
            </div>
        </div>
    </section>
</body>
</html>
